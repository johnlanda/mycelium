apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: auth-enrichment-extproc
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: backend
  extProc:
    - backendRefs:
        - name: auth-enrichment
          namespace: ext-proc-system
          port: 9001
      processingMode:
        request:
          body: Buffered
        response:
          body: None
      failOpen: true
      messageTimeout: 500ms
      metadataOptions:
        receivedMetadata:
          namespace: envoy.filters.http.jwt_authn
        sentMetadata:
          namespace: com.example.auth
