# BackendTrafficPolicy: Circuit breaking + retry with exponential backoff
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: api-traffic-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: api-route
  circuitBreaker:
    maxConnections: 100
    maxPendingRequests: 50
  retry:
    numRetries: 3
    retryOn:
      triggers:
        - "5xx"
        - "gateway-error"
    perRetry:
      backOff:
        baseInterval: 500ms
        maxInterval: 5s
