---
# Primary Backend routing to api.example.com:443 via FQDN
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: primary-backend
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: api.example.com
        port: 443
---
# Fallback Backend routing to fallback-api.example.com:443 via FQDN
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: fallback-backend
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: fallback-api.example.com
        port: 443
  fallback: true
---
# BackendTrafficPolicy with circuit breaking and retry logic
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: backend-resilience-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: backend  # Update this to match your HTTPRoute name
  # Circuit Breaker configuration
  circuitBreaker:
    maxConnections: 100
    maxPendingRequests: 50
  # Retry configuration
  retry:
    numRetries: 3
    retryOn:
      triggers:
        - 5xx
        - gateway-error
    perRetry:
      backOff:
        baseInterval: 500ms
