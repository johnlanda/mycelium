---
# Primary Backend routing to api.example.com:443
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: primary-api-backend
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: api.example.com
        port: 443
  appProtocols:
    - gateway.envoyproxy.io/h2c
---
# Fallback Backend routing to fallback-api.example.com:443
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: fallback-api-backend
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: fallback-api.example.com
        port: 443
  appProtocols:
    - gateway.envoyproxy.io/h2c
  fallback: true
---
# BackendTrafficPolicy with circuit breaking and retry logic
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: api-traffic-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: primary-api-backend
  circuitBreaker:
    maxConnections: 100
    maxPendingRequests: 50
  retry:
    numRetries: 3
    retryOn:
      triggers:
        - 5xx
        - gateway-error
    perRetry:
      backOff:
        baseInterval: 500ms
        maxInterval: 10s
      timeout: 10s
